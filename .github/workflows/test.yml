name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  smoke-test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --dir

      - name: Verify app bundle exists
        run: |
          MAC_DIR=$(ls -d release/mac* | head -1)
          APP=$(find "$MAC_DIR" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle: $APP"
          [ -n "$APP" ] || { echo "FAIL: No .app bundle found"; exit 1; }
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Verify app structure
        run: |
          echo "--- Checking app contents ---"
          ls "$APP_PATH/Contents/"
          ls "$APP_PATH/Contents/Resources/"
          test -f "$APP_PATH/Contents/Resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing from Resources"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "$APP_PATH/Contents/Resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"

      - name: Smoke test — main process loads without error
        run: |
          # CI has no display, so run Electron main process validation via xvfb
          npx xvfb-maybe npx electron --no-sandbox -e "
            const { app } = require('electron');
            const db = require('./src/db');
            app.whenReady().then(async () => {
              try {
                await db.initDB();
                console.log('PASS: DB initialized');
                app.quit();
              } catch (e) {
                console.error('FAIL:', e.message);
                process.exit(1);
              }
            });
            setTimeout(() => { console.error('FAIL: Timeout'); process.exit(1); }, 15000);
          "
          echo "PASS: Main process smoke test completed"

  smoke-test-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --dir

      - name: Verify app structure
        shell: bash
        run: |
          test -f "release/win-unpacked/resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "release/win-unpacked/resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"
