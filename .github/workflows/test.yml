name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  smoke-test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --dir

      - name: Verify app bundle exists
        run: |
          MAC_DIR=$(ls -d release/mac* | head -1)
          APP=$(find "$MAC_DIR" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle: $APP"
          [ -n "$APP" ] || { echo "FAIL: No .app bundle found"; exit 1; }
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Verify app structure
        run: |
          echo "--- Checking app contents ---"
          ls "$APP_PATH/Contents/"
          ls "$APP_PATH/Contents/Resources/"
          test -f "$APP_PATH/Contents/Resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing from Resources"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "$APP_PATH/Contents/Resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"

      - name: Smoke test — verify asar contains required files
        run: |
          npx asar list "$APP_PATH/Contents/Resources/app.asar" > /tmp/asar-contents.txt
          echo "--- Checking asar contents ---"
          grep "main.js" /tmp/asar-contents.txt || { echo "FAIL: main.js missing from asar"; exit 1; }
          echo "PASS: main.js found"
          grep "preload.js" /tmp/asar-contents.txt || { echo "FAIL: preload.js missing from asar"; exit 1; }
          echo "PASS: preload.js found"
          grep "src/db.js" /tmp/asar-contents.txt || { echo "FAIL: src/db.js missing from asar"; exit 1; }
          echo "PASS: src/db.js found"
          grep "src/macos/get-active-window.js" /tmp/asar-contents.txt || { echo "FAIL: macOS module missing from asar"; exit 1; }
          echo "PASS: macOS module found"
          grep "renderer/index.html" /tmp/asar-contents.txt || { echo "FAIL: renderer missing from asar"; exit 1; }
          echo "PASS: renderer found"
          grep "node_modules/sql.js" /tmp/asar-contents.txt || { echo "FAIL: sql.js missing from asar"; exit 1; }
          echo "PASS: sql.js bundled"
          echo "PASS: All required files present in app bundle"

  smoke-test-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --dir

      - name: Verify app structure
        shell: bash
        run: |
          test -f "release/win-unpacked/resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "release/win-unpacked/resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"
