name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  smoke-test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --dir

      - name: Verify app bundle exists
        run: |
          MAC_DIR=$(ls -d release/mac* | head -1)
          APP=$(find "$MAC_DIR" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle: $APP"
          [ -n "$APP" ] || { echo "FAIL: No .app bundle found"; exit 1; }
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Verify app structure
        run: |
          echo "--- Checking app contents ---"
          ls "$APP_PATH/Contents/"
          ls "$APP_PATH/Contents/Resources/"
          test -f "$APP_PATH/Contents/Resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing from Resources"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "$APP_PATH/Contents/Resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"

      - name: Smoke test — verify asar contains required files
        run: |
          npx asar list "$APP_PATH/Contents/Resources/app.asar" > /tmp/asar-contents.txt
          echo "--- Checking asar contents ---"
          for f in main.js preload.js src/db.js src/macos/get-active-window.js renderer/index.html; do
            grep "$f" /tmp/asar-contents.txt || { echo "FAIL: $f missing from asar"; exit 1; }
            echo "PASS: $f found"
          done
          grep "node_modules/sql.js" /tmp/asar-contents.txt || { echo "FAIL: sql.js missing from asar"; exit 1; }
          echo "PASS: All required files present in app bundle"

      - name: Smoke test — main process starts without crash
        run: |
          # Use Electron binary from the built app to validate runtime loading
          # Write a minimal test script that initializes DB (the main failure point on macOS)
          cat > /tmp/smoke-test.js << 'SMOKE'
          const { app } = require('electron');
          app.disableHardwareAcceleration();
          app.whenReady().then(async () => {
            try {
              const db = require('./src/db');
              await db.initDB();
              console.log('PASS: DB initialized successfully');
              process.exit(0);
            } catch (e) {
              console.error('FAIL:', e.message);
              process.exit(1);
            }
          });
          setTimeout(() => { console.error('FAIL: Timeout after 15s'); process.exit(1); }, 15000);
          SMOKE
          # Copy script to project root so require('./src/db') resolves correctly
          cp /tmp/smoke-test.js ./smoke-test.js
          npx electron --no-sandbox --disable-gpu ./smoke-test.js
          rm -f ./smoke-test.js

  smoke-test-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --dir

      - name: Verify app structure
        shell: bash
        run: |
          test -f "release/win-unpacked/resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "release/win-unpacked/resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"
