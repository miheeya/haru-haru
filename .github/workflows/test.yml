name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  smoke-test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --mac --dir

      - name: Verify app bundle exists
        run: |
          MAC_DIR=$(ls -d release/mac* | head -1)
          APP=$(find "$MAC_DIR" -name "*.app" -maxdepth 1 | head -1)
          echo "App bundle: $APP"
          [ -n "$APP" ] || { echo "FAIL: No .app bundle found"; exit 1; }
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Verify app structure
        run: |
          echo "--- Checking app contents ---"
          ls "$APP_PATH/Contents/"
          ls "$APP_PATH/Contents/Resources/"
          test -f "$APP_PATH/Contents/Resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing from Resources"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "$APP_PATH/Contents/Resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"

      - name: Smoke test — app launches and exits cleanly
        run: |
          ELECTRON="$APP_PATH/Contents/MacOS/$(ls "$APP_PATH/Contents/MacOS/" | head -1)"
          echo "Launching: $ELECTRON"
          # Launch app, wait 5 seconds, then check it's running
          "$ELECTRON" &
          APP_PID=$!
          sleep 5
          if kill -0 $APP_PID 2>/dev/null; then
            echo "PASS: App is running after 5 seconds (PID $APP_PID)"
            kill $APP_PID
            wait $APP_PID 2>/dev/null || true
            echo "PASS: App exited cleanly"
          else
            echo "FAIL: App crashed within 5 seconds"
            exit 1
          fi

  smoke-test-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx electron-builder --win --dir

      - name: Verify app structure
        shell: bash
        run: |
          test -f "release/win-unpacked/resources/sql-wasm.wasm" || { echo "FAIL: sql-wasm.wasm missing"; exit 1; }
          echo "PASS: sql-wasm.wasm found"
          test -f "release/win-unpacked/resources/app.asar" || { echo "FAIL: app.asar missing"; exit 1; }
          echo "PASS: app.asar found"
