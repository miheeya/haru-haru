<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haru-Haru</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" aria-label="메인 내비게이션">
      <div class="logo">
        <div class="logo-row">
          <img src="../assets/icon.png" class="logo-icon" alt="하루하루 로고">
          <h1>하루하루</h1>
        </div>
        <span class="subtitle">Daily Tracker</span>
      </div>
      <ul class="nav-list" role="tablist" aria-label="메뉴">
        <li class="nav-item active" data-view="briefing" role="tab" tabindex="0" aria-selected="true">
          <span class="nav-icon" aria-hidden="true">☀️</span>
          <span>아침 브리핑</span>
        </li>
        <li class="nav-item" data-view="dashboard" role="tab" tabindex="0" aria-selected="false">
          <span class="nav-icon" aria-hidden="true">📊</span>
          <span>대시보드</span>
        </li>
        <li class="nav-item" data-view="journal" role="tab" tabindex="0" aria-selected="false">
          <span class="nav-icon" aria-hidden="true">📝</span>
          <span>업무 일지</span>
        </li>
        <li class="nav-item" data-view="trend" role="tab" tabindex="0" aria-selected="false">
          <span class="nav-icon" aria-hidden="true">📈</span>
          <span>트렌드</span>
        </li>
        <li class="nav-item" data-view="settings" role="tab" tabindex="0" aria-selected="false">
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span>설정</span>
        </li>
        <li class="nav-item" data-view="help" role="tab" tabindex="0" aria-selected="false">
          <span class="nav-icon" aria-hidden="true">❓</span>
          <span>도움말</span>
        </li>
      </ul>
      <button class="tracking-status" id="tracking-status" aria-label="추적 상태 토글">
        <span class="status-dot active" aria-hidden="true"></span>
        <span>추적 중</span>
      </button>
    </nav>
    <main class="content" id="content" role="tabpanel" aria-live="polite">
      <!-- Views rendered here -->
    </main>
  </div>
  <script src="lib/chart.min.js"></script>
  <script src="views/briefing.js"></script>
  <script src="views/dashboard.js"></script>
  <script src="views/journal.js"></script>
  <script src="views/trend.js"></script>
  <script src="views/settings.js"></script>
  <script src="views/help.js"></script>
  <script src="app.js"></script>
</body>
</html>
